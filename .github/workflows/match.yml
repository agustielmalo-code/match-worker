# Matcher por STORYBOARD (match_sb) en GitHub Actions.
# Busca con la YouTube Data API oficial (secret YT_API_KEY, sin rate-limit) y puntúa con
# los storyboards de i.ytimg (CDN, no bloqueado) — SIN cookies, SIN proxy, SIN bajar video.
# Por eso corre en las IPs de GitHub sin el bloqueo que frena la descarga de video.
name: match

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "slug del video"
        required: true
      chunks:
        description: "en cuantos runners repartir"
        required: false
        default: "20"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          N=${{ github.event.inputs.chunks }}
          LIST=$(node -e "console.log(JSON.stringify(Array.from({length:$N},(_,i)=>i)))")
          echo "matrix=$LIST" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: install deps
        if: steps.nm.outputs.cache-hit != 'true'
        run: |
          n=0; until npm ci; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; rm -rf node_modules; sleep 20; done
      - name: cache modelo CLIP
        uses: actions/cache@v4
        with: { path: .cache, key: clipmodel-clip-vit-base-patch32 }
      - name: prefetch modelo CLIP
        run: node -e "import('@huggingface/transformers').then(async t=>{await t.pipeline('zero-shot-image-classification','Xenova/clip-vit-base-patch32',{dtype:'q8'});console.log('CLIP cacheado');}).catch(e=>{console.error(e);process.exit(1)})"

  match:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idx: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: install deps
        if: steps.nm.outputs.cache-hit != 'true'
        run: |
          n=0; until npm ci; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; rm -rf node_modules; sleep 20; done
      - name: cache modelo CLIP
        uses: actions/cache@v4
        with: { path: .cache, key: clipmodel-clip-vit-base-patch32 }
      - name: cache yt-dlp + ffmpeg
        uses: actions/cache@v4
        with: { path: ~/bincache, key: ytffmpeg-v2 }
      - name: install yt-dlp + ffmpeg
        run: |
          mkdir -p ~/bincache
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/bincache/yt-dlp
          chmod a+rx ~/bincache/yt-dlp; sudo cp ~/bincache/yt-dlp /usr/local/bin/yt-dlp; yt-dlp --version
          if [ ! -f ~/bincache/ffmpeg ]; then
            curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o /tmp/ff.tar.xz
            tar -xf /tmp/ff.tar.xz -C /tmp; cp /tmp/ffmpeg-*-static/ffmpeg ~/bincache/ffmpeg; chmod a+rx ~/bincache/ffmpeg
          fi
          sudo cp ~/bincache/ffmpeg /usr/local/bin/ffmpeg
      - name: install deno (n-challenge de yt-dlp -J)
        run: |
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=$HOME/.deno sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
      - name: download match list
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release download "match-${{ github.event.inputs.slug }}" --pattern "match_${{ github.event.inputs.slug }}.json" --dir .
      - name: match shard (storyboard + API)
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          MATCH_CANDS: "6"
          MATCH_POOL: "12"
        run: node match_sb.mjs "${{ github.event.inputs.slug }}" ${{ matrix.idx }} ${{ github.event.inputs.chunks }} "match_${{ github.event.inputs.slug }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: matchpart-${{ matrix.idx }}
          path: out/match_part_${{ matrix.idx }}.json
          retention-days: 3

  aggregate:
    needs: match
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: parts, pattern: "matchpart-*", merge-multiple: true }
      - name: merge
        run: node scripts/match_merge.mjs "${{ github.event.inputs.slug }}" parts
      - uses: actions/upload-artifact@v4
        with:
          name: matched-${{ github.event.inputs.slug }}
          path: clips_${{ github.event.inputs.slug }}_matched.json
          retention-days: 7
